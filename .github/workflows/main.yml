name: Daily Quant Scanner

on:
  schedule:
    - cron: '30 23 * * *' # 매일 아침 8시 30분 (UTC 기준 23:30)
    - cron: '30 5 * * *'
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    # Node.js 24 강제 옵션 추가 (경고 해결)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. 소스코드 체크아웃 (v4로 업데이트)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 파이썬 설정 (v5로 업데이트)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필수 라이브러리 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance pykrx requests

      # 4. 분석 스크립트 실행
      - name: Run Quant Analysis
        run: python main.py

      # 5. 생성된 CSV 파일을 저장소에 업데이트 (Push)
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_quant_report.csv
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Daily Report $(date +'%Y-%m-%d')"
          git push
